name: bottle-build

# OHOS bottle pipeline: GitHub-hosted ARM runner + OHOS container.
# Logic lives in .github/scripts/; this file is orchestration only.
#
# Manual: Actions → bottle-build → Run workflow
#   upload=false (default): build + bottle + workflow artifact (no repo changes)
#   upload=true: upload to atomgit release (tag <formula>-v<ver>-rN), merge the
#     bottle block back, push GitHub + atomgit main, verify poured_from_bottle
# Also callable via workflow_call:
#   pr-validate.yml invokes this per changed formula on pull_request (always
#     upload=false — build + test only, gates the ci-passed label)
#   publish-on-merge.yml invokes this per changed formula on push to main
#     (always upload=true — the PR already passed pr-validate, so a merge
#     means "ready to publish")
#
# TODO (low priority): M3 release GET||POST 409 race; L2 upload=false
# artifacts have a fake root-url, never merge them manually.

on:
  workflow_dispatch:
    inputs:
      formula:
        description: 'Formula name (e.g. icu4c@78 / bun / llvm@21 / claude-code)'
        required: true
        type: string
      upload:
        description: 'Upload bottle to atomgit release and write back the bottle block (pushes both remotes)'
        required: true
        type: boolean
        default: false
  workflow_call:
    inputs:
      formula:
        required: true
        type: string
      upload:
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  # event_name in the group keeps auto (push) runs from evicting a queued
  # manual publish run of the same formula
  group: bottle-build-${{ github.event_name }}-${{ inputs.formula }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/social4hyq/ci-runner@sha256:38e740c8e355b2ccc9f34ba4bcab955a3fbc076278ae4bd3a07ea3707e90bb56 # :latest, 2026-07-19
  CONTAINER: ohos
  TAP_IN_CONTAINER: /storage/Users/currentUser/.harmonybrew/Homebrew/Library/Taps/social4hyq/homebrew-core
  # Inputs pass through env (never interpolated into shell) and a whitelist check
  FORMULA: ${{ inputs.formula }}
  UPLOAD: ${{ inputs.upload }}
  RUN_NUMBER: ${{ github.run_number }}

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Validate input
        run: |
          [[ "$FORMULA" =~ ^[A-Za-z0-9@+._-]+$ ]] \
            || { echo "::error::invalid formula name: $FORMULA (allowed: [A-Za-z0-9@+._-])"; exit 1; }

      - name: Start OHOS container
        run: .github/scripts/setup-container.sh

      - name: Build from source
        run: .github/scripts/build.sh

      - name: brew test gate
        run: .github/scripts/test-gate.sh

      - name: Failure diagnostics
        if: failure()
        run: |
          echo "== brew logs =="
          docker exec "$CONTAINER" bash -lc \
            'for f in /root/.cache/Homebrew/Logs/*/*; do echo "--- $f"; tail -30 "$f"; done' || true

      - name: Bottle
        id: bottle
        env:
          ATOMGIT_TOKEN: ${{ secrets.ATOMGIT_TOKEN }}
        run: .github/scripts/bottle.sh

      - name: Upload bottle as artifact
        if: success() && !inputs.upload
        uses: actions/upload-artifact@v4
        with:
          name: bottle-${{ inputs.formula }}-run${{ github.run_number }}
          path: bottle-out/
          retention-days: 14

      - name: Publish to atomgit and push
        id: publish
        if: inputs.upload
        env:
          ATOMGIT_TOKEN: ${{ secrets.ATOMGIT_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # main requires PRs; GITHUB_TOKEN can't bypass that ruleset, so the
          # bottle commit pushes with an admin PAT instead (bypass actor).
          BOT_PUSH_TOKEN: ${{ secrets.BOT_PUSH_TOKEN }}
          TAG: ${{ steps.bottle.outputs.tag }}
        run: .github/scripts/publish.sh

      - name: Verify poured bottle
        id: verify
        if: inputs.upload
        run: .github/scripts/verify-poured.sh

      # publish failed before the bottle commit reached main → the release is
      # orphaned and safe to delete
      - name: Roll back atomgit release
        if: failure() && inputs.upload && steps.publish.outcome == 'failure'
        env:
          ATOMGIT_TOKEN: ${{ secrets.ATOMGIT_TOKEN }}
          TAG: ${{ steps.bottle.outputs.tag }}
        run: .github/scripts/rollback-release.sh

      # verify failed after main was pushed → main references the bad tag;
      # auto-deleting would make it worse, needs a human decision
      - name: Bad release advisory
        if: failure() && inputs.upload && steps.verify.outcome == 'failure'
        env:
          TAG: ${{ steps.bottle.outputs.tag }}
        run: |
          echo "- ❌ published tag $TAG failed verification: revert the bottle commit on main and delete the release, or fix forward and re-run" >> "$GITHUB_STEP_SUMMARY"
