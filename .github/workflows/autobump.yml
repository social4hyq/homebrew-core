name: autobump

# Weekly: open a bump-formula-pr for each allowlisted formula whose upstream
# livecheck version is newer than what's packaged. Feeds the same pipeline
# as human-authored PRs — pr-validate.yml gates it with ci-passed, a human
# merges, publish-on-merge.yml publishes.
#
# ALLOWLIST is deliberately narrow and explicit: most formulae in this tap
# have a custom structure (bun's rN revision, pinned llvm@21/icu4c@78, shims
# with no upstream at all) that `bump-formula-pr`'s url/sha256 gsub can't
# rewrite cleanly. claude-code's and opencode's non-trivial install()
# (signing, RUNPATH injection, bundled shim deps) don't matter here — their
# formula-level url/version/sha256 shape (npmmirror tarball, version
# embedded in the URL) is a plain, bump-formula-pr-compatible pattern like
# codex/grok-build; install() logic is version-independent packaging that a
# version bump never touches. opencode is the prebuilt-binary formula
# (Formula/o/opencode.rb) — NOT ohos-opencode, the from-source formula with
# 5 patches under Patches/ohos-opencode/ that need hand-regenerating from
# the ohos-opencode dev branch on every bump; that one must stay manual.
# Only add a formula here after confirming `brew bump-formula-pr --dry-run`
# produces a clean url/sha256 edit for it. version-check.yml keeps reporting
# the full outdated list (allowlisted or not) for humans deciding what to
# bump by hand or add here next.

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      formula:
        description: 'Restrict to a single allowlisted formula (optional; must still be outdated per livecheck)'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

env:
  ALLOWLIST: "codex opencode grok-build claude-code"
  IMAGE: ghcr.io/social4hyq/ci-runner@sha256:38e740c8e355b2ccc9f34ba4bcab955a3fbc076278ae4bd3a07ea3707e90bb56 # :latest, 2026-07-19
  CONTAINER: ohos
  TAP_IN_CONTAINER: /storage/Users/currentUser/.harmonybrew/Homebrew/Library/Taps/social4hyq/homebrew-core

jobs:
  autobump:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Start OHOS container
        run: .github/scripts/setup-container.sh
      - name: Open bump PRs
        env:
          # Pushes the bump branch. Also used for GH_TOKEN below (not
          # secrets.GITHUB_TOKEN): this repo has "Allow GitHub Actions to
          # create pull requests" disabled, so gh pr create with the
          # ephemeral Actions token 403s with "GitHub Actions is not
          # permitted to create or approve pull requests" regardless of the
          # workflow's own permissions: block (confirmed 2026-07-20) — a
          # personal PAT isn't subject to that repo setting.
          BOT_PUSH_TOKEN: ${{ secrets.BOT_PUSH_TOKEN }}
          GH_TOKEN: ${{ secrets.BOT_PUSH_TOKEN }}
          ONLY_FORMULA: ${{ inputs.formula }}
        run: .github/scripts/autobump.sh
