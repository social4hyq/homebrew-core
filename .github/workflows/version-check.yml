name: version-check

# Weekly livecheck report: lists formulae whose upstream version is newer.
# Report-only; bumping stays a deliberate manual edit (which auto-validate
# then builds and tests on push).

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

concurrency:
  group: version-check
  cancel-in-progress: false

defaults:
  run:
    shell: bash -euo pipefail {0}

permissions:
  contents: read

env:
  IMAGE: ghcr.io/social4hyq/ci-runner@sha256:38e740c8e355b2ccc9f34ba4bcab955a3fbc076278ae4bd3a07ea3707e90bb56 # :latest, 2026-07-19
  CONTAINER: ohos
  TAP_IN_CONTAINER: /storage/Users/currentUser/.harmonybrew/Homebrew/Library/Taps/social4hyq/homebrew-core

jobs:
  livecheck:
    # scheduled workflows shouldn't run (and fail on missing secrets) in forks
    if: github.repository == 'social4hyq/homebrew-core'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - name: Start OHOS container
        run: .github/scripts/setup-container.sh
      - name: livecheck report
        run: .github/scripts/version-check.sh
