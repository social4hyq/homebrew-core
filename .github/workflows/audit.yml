name: audit

# Manual full-tap audit: brew readall + brew audit over every formula.
# Used to enumerate/clear audit findings; light-check runs the same checks
# per-push on changed formulae only.

on:
  workflow_dispatch:

concurrency:
  group: audit
  cancel-in-progress: false

defaults:
  run:
    shell: bash -euo pipefail {0}

permissions:
  contents: read

env:
  IMAGE: swr.cn-north-4.myhuaweicloud.com/harmonybrew/ci-runner@sha256:57ce4ca832d937dcc86abae6ec0e8fb6b34ac86aa8fdbe43548b6fe78d3438c1 # :latest, 2026-07-03 (SWR mirror, anon-pullable)
  CONTAINER: ohos
  TAP_IN_CONTAINER: /storage/Users/currentUser/.harmonybrew/Homebrew/Library/Taps/social4hyq/homebrew-core

jobs:
  audit:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Start OHOS container
        run: .github/scripts/setup-container.sh
      - name: readall + audit (all formulae)
        run: |
          CHANGED_JSON=$(find Formula -name '*.rb' | sed 's|.*/||; s|\.rb$||' | jq -Rnc '[inputs]')
          export CHANGED_JSON
          .github/scripts/light-check.sh
