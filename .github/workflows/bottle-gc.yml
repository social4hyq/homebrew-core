name: bottle-gc

# Weekly: delete atomgit (+ GitHub mirror) bottle releases that no formula's
# current `bottle do` block references anymore — orphaned by version bumps,
# revision bumps, or (2026-07-20) the squash-merge mishap that produced a
# redundant ci-smoke-test-v0.1.0-r1 next to the -r2 that superseded it.
# Adapted from Harmonybrew/ci's auto_clear.py; they compare against a
# package-index JSON we don't have (no generate-formula-api here), so this
# compares directly against each formula's own bottle block instead.
#
# Dry-run by default: schedule always dry-runs (report only, via job
# summary); workflow_dispatch also defaults dry_run=true. Deletion is hard
# to undo and this is new, unvalidated automation — pass dry_run=false
# explicitly to actually delete anything.

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Report only, do not delete'
        required: false
        type: boolean
        default: true

concurrency:
  group: bottle-gc
  cancel-in-progress: false

defaults:
  run:
    shell: bash -euo pipefail {0}

permissions:
  contents: read

env:
  DRY_RUN: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run }}

jobs:
  gc:
    # scheduled workflows shouldn't run (and fail on missing secrets) in forks
    if: github.repository == 'social4hyq/homebrew-core'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Garbage-collect orphaned bottle releases
        env:
          ATOMGIT_TOKEN: ${{ secrets.ATOMGIT_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/gc-old-bottles.sh
