name: bottle-build

# 正式 bottle 构建流水线：GitHub 托管 ARM runner（ubuntu-24.04-arm）+ OHOS 容器。
# 用法：Actions → bottle-build → Run workflow → 填 formula
#   upload=false（默认）：构建 + 打 bottle + 传 workflow artifact（验证/调试，不改仓库）
#   upload=true：上传到 atomgit releases（tag <formula>-v<ver>-r<N>，N 按现有最大
#     值 +1）、brew bottle --merge --write 回写 formula、push GitHub main + atomgit
#     main，最后卸载重装验证 poured_from_bottle + brew test
#   probe=true：只跑 spawnSync stdin 探针（环境诊断用）
#
# 环境要点（都是 spike 阶段实测踩过的坑，勿删）：
# - seccomp=unconfined：docker 默认 profile 拦截 io_uring_setup(EPERM)，bun 启动即死
# - /system/lib/ld-musl symlink：bottle 二进制的 PT_INTERP 是真机路径，镜像内没有
# - brew trust：Harmonybrew fork 信任机制，formula 内容变化后不 trust 会静默 exit 0
# - brew install 失败 90s 重试一次：atomgit CDN 有瞬时 404
# - cargo sparse：镜像内默认 git protocol，从 Azure 拉太慢

on:
  workflow_dispatch:
    inputs:
      formula:
        description: 'Formula 名（如 icu4c@78 / bun / bun-webkit / llvm@21 / ohos-opencode）'
        required: true
        type: string
      upload:
        description: '上传 bottle 到 atomgit Release 并回写 formula（push 双 remote）'
        required: true
        type: boolean
        default: false
      probe:
        description: '只跑 spawnSync stdin 探针（跳过构建，诊断用）'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: bottle-build-${{ inputs.formula }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/social4hyq/ci-runner:latest
  CONTAINER: ohos
  BREW_ENV: HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_ANALYTICS=1 HOMEBREW_NO_ENV_HINTS=1
  TAP_IN_CONTAINER: /storage/Users/currentUser/.harmonybrew/Homebrew/Library/Taps/social4hyq/homebrew-core

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    steps:
      - name: 释放磁盘 + 资源摸底
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /usr/local/share/swift \
                      /opt/hostedtoolcache /usr/local/share/powershell \
                      /usr/local/lib/minikube /usr/local/share/chromium 2>/dev/null || true
          docker system prune -af >/dev/null 2>&1 || true
          echo "== 清理后磁盘 =="; df -h /
          echo "== 资源 =="; nproc; free -g

      - uses: actions/checkout@v4

      - name: 登录 ghcr.io（镜像为 private，用 GHCR_PAT secret 拉取）
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u social4hyq --password-stdin

      - name: 拉取镜像并启动 OHOS 容器
        run: |
          docker pull "$IMAGE"
          docker run -d --name "$CONTAINER" --init \
            --security-opt seccomp=unconfined \
            -v "$GITHUB_WORKSPACE:$TAP_IN_CONTAINER" \
            "$IMAGE" sleep infinity
          # 一次性容器配置（与服务器一致）：musl tmpfile() 硬编码路径 + /system/bin/sh
          # + /system/lib/ld-musl（bottle 二进制的 PT_INTERP 是真机路径
          # /system/lib/ld-musl-aarch64.so.1，镜像里没有，服务器上是手工建的 symlink）
          docker exec "$CONTAINER" bash -lc \
            'mkdir -p /data/local/tmp /system/bin /system/lib && \
             ln -sf /bin/sh /system/bin/sh && \
             ln -sf /lib/ld-musl-aarch64.so.1 /system/lib/ld-musl-aarch64.so.1'
          # CI 网络（Azure）下 cargo 走 sparse 直连 crates.io；镜像内默认 git protocol 太慢
          docker exec "$CONTAINER" bash -lc \
            'mkdir -p /root/.cargo && printf "[registries.crates-io]\nprotocol = \"sparse\"\n\n[net]\ngit-fetch-with-cli = true\nretry = 3\n" > /root/.cargo/config.toml'
          docker exec "$CONTAINER" bash -lc 'brew --version && brew tap'
          # Harmonybrew fork 的信任机制：formula 内容变化后需重新 trust，否则拒绝加载（静默 exit 0）
          docker exec "$CONTAINER" bash -lc 'brew trust social4hyq/core'
          # brew bottle --merge --write 在 fork 里会自动 git commit tap；容器内 root
          # 操作挂载的 runner 目录会撞 git dubious ownership，且需要提交身份
          docker exec "$CONTAINER" git config --global --add safe.directory "$TAP_IN_CONTAINER"
          docker exec "$CONTAINER" git config --global user.name "github-actions[bot]"
          docker exec "$CONTAINER" git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: spawnSync stdin 探针（probe=true）
        if: inputs.probe
        run: |
          docker exec "$CONTAINER" bash -lc "$BREW_ENV brew install bun-bootstrap"
          docker exec "$CONTAINER" bash -lc 'cd /tmp && printf "a\n" > tcc.h &&
            /storage/Users/currentUser/.harmonybrew/opt/bun-bootstrap/bin/bun -e "
              const { spawnSync } = require(\"node:child_process\");
              const r = spawnSync(\"git\", [\"apply\",\"--no-index\",\"-\"],
                { input: \"--- tcc.h\n+++ tcc.h\n@@ -1,1 +1,1 @@\n-a\n+b\n\",
                  stdio: [\"pipe\",\"ignore\",\"pipe\"], encoding: \"utf8\" });
              console.log(\"node:child_process spawnSync status=\" + r.status +
                \" stderr=\" + JSON.stringify(r.stderr));
              const r2 = Bun.spawnSync([\"git\",\"apply\",\"--no-index\",\"-\"],
                { input: \"--- tcc.h\n+++ tcc.h\n@@ -1,1 +1,1 @@\n-b\n+c\n\",
                  stdio: [\"pipe\",\"ignore\",\"pipe\"], encoding: \"utf8\" });
              console.log(\"Bun.spawnSync status=\" + r2.status +
                \" stderr=\" + JSON.stringify(r2.stderr));
            " && echo "--- tcc.h now: $(cat tcc.h)"'

      - name: 源码构建 formula
        if: '!inputs.probe'
        run: |
          # atomgit CDN 有瞬时 404（实测 node bottle 连续 4 次 404，1 分钟后恢复 200）；
          # 失败隔 90s 重试一次。brew 对已下载/已安装部分增量复用，重试成本低
          for i in 1 2; do
            if docker exec "$CONTAINER" bash -lc \
              "$BREW_ENV brew install --build-bottle --verbose social4hyq/core/${{ inputs.formula }}" 2>&1 | tee build.log; then
              break
            fi
            [ "$i" = 2 ] && exit 1
            echo "::warning::brew install 第 $i 次失败，90s 后重试（atomgit 瞬时 404 容错）"
            sleep 90
          done
          echo "== 构建后磁盘 =="
          docker exec "$CONTAINER" df -h /
          df -h /
          # Harmonybrew 的 trust 拒绝会静默 exit 0，显式校验 keg 真的装上了
          N=$(docker exec "$CONTAINER" bash -lc \
            "$BREW_ENV brew info --json=v2 social4hyq/core/${{ inputs.formula }}" \
            | jq -r '.formulae[0].installed | length')
          echo "installed_kegs=$N"
          [ "$N" -ge 1 ] || { echo "::error::formula 未安装（疑似 brew 静默拒绝，检查 trust/依赖）"; exit 1; }

      - name: 构建失败诊断
        if: failure()
        run: |
          echo "== brew 日志 =="
          docker exec "$CONTAINER" bash -lc \
            'for f in /root/.cache/Homebrew/Logs/*/*; do echo "--- $f"; tail -30 "$f"; done' || true
          echo "== bun-bootstrap 可执行性自检 =="
          BIN=/storage/Users/currentUser/.harmonybrew/opt/bun-bootstrap/bin/bun
          docker exec "$CONTAINER" bash -lc \
            "ls -la $BIN* 2>/dev/null; file $BIN 2>/dev/null; head -c 200 $BIN | od -c | head -3; $BIN --version; echo bun_exit=\$?" || true

      - name: 打 bottle（upload=true 时先定 atomgit tag）
        if: '!inputs.probe'
        id: bottle
        env:
          ATOMGIT_TOKEN: ${{ secrets.ATOMGIT_TOKEN }}
        run: |
          VER=$(docker exec "$CONTAINER" bash -lc \
            "$BREW_ENV brew info --json=v2 social4hyq/core/${{ inputs.formula }}" \
            | jq -r '.formulae[0].versions.stable')
          BASE="${{ inputs.formula }}-v${VER}"
          if [ "${{ inputs.upload }}" = "true" ]; then
            # tag 与现有约定一致（保留 @）：icu4c@78-v78.3-r2；N = 现有最大 + 1
            MAX=$(curl -sf -m 30 -H "Authorization: Bearer $ATOMGIT_TOKEN" \
              "https://atomgit.com/api/v5/repos/social4hyq/homebrew-core/releases?per_page=100" \
              | jq -r '.[].tag_name' | grep -E "^${BASE}-r[0-9]+$" \
              | sed "s/^${BASE}-r//" | sort -n | tail -1 || true)
            TAG="${BASE}-r$(( ${MAX:-0} + 1 ))"
            ROOT="https://atomgit.com/social4hyq/homebrew-core/releases/download/$TAG"
          else
            TAG="${BASE}-ci${{ github.run_number }}"
            ROOT="https://github.com/social4hyq/homebrew-core/releases/download/$TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "== version=$VER tag=$TAG =="
          docker exec -w /root "$CONTAINER" bash -lc \
            "$BREW_ENV brew bottle --json --root-url $ROOT social4hyq/core/${{ inputs.formula }}"
          mkdir -p bottle-out
          docker exec "$CONTAINER" bash -lc \
            "mv /root/*.bottle.tar.gz /root/*.bottle.json '$TAP_IN_CONTAINER/bottle-out/'"
          ls -la bottle-out/

      - name: 上传 bottle 为 artifact（不上 Release 时的产物出口）
        if: success() && !inputs.probe
        uses: actions/upload-artifact@v4
        with:
          name: bottle-${{ inputs.formula }}-run${{ github.run_number }}
          path: bottle-out/
          retention-days: 14

      - name: 上传 atomgit + 回写 formula + push（upload=true）
        if: inputs.upload
        env:
          ATOMGIT_TOKEN: ${{ secrets.ATOMGIT_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${{ steps.bottle.outputs.tag }}"
          BOTTLE=$(ls bottle-out/*.tar.gz | head -1)
          FILENAME=$(basename "$BOTTLE")
          # 1. 检查或创建 release（atomgit 不返回 release id，用 tag 标识）
          curl -sf -m 30 -H "Authorization: Bearer $ATOMGIT_TOKEN" \
            "https://atomgit.com/api/v5/repos/social4hyq/homebrew-core/releases/tags/$TAG" \
            || curl -sf -m 30 -X POST -H "Authorization: Bearer $ATOMGIT_TOKEN" \
                 -H "Content-Type: application/json" \
                 -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"target_commitish\":\"main\",\"body\":\"$TAG bottle (CI run ${{ github.run_number }})\"}" \
                 "https://atomgit.com/api/v5/repos/social4hyq/homebrew-core/releases"
          # 2. 取预签名 upload URL（必须带 file_name）
          RESP=$(curl -sf -m 30 -H "Authorization: Bearer $ATOMGIT_TOKEN" \
            "https://atomgit.com/api/v5/repos/social4hyq/homebrew-core/releases/$TAG/upload_url?file_name=$FILENAME")
          UPLOAD_URL=$(echo "$RESP" | jq -r .url)
          H_PROJECT=$(echo "$RESP" | jq -r '.headers["x-obs-meta-project-id"]')
          H_ACL=$(echo "$RESP" | jq -r '.headers["x-obs-acl"]')
          H_CALLBACK=$(echo "$RESP" | jq -r '.headers["x-obs-callback"]')
          # 3. PUT 到预签名 URL（OBS 对象存储）
          curl -sf -m 300 -X PUT "$UPLOAD_URL" \
            -H "x-obs-meta-project-id: $H_PROJECT" \
            -H "x-obs-acl: $H_ACL" \
            -H "x-obs-callback: $H_CALLBACK" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@$BOTTLE" -w "HTTP=%{http_code}\n"
          # 4. 回写 formula bottle 块（--merge 的参数是 json 文件，不是 formula 名）
          docker exec -w "$TAP_IN_CONTAINER/bottle-out" "$CONTAINER" bash -lc \
            "$BREW_ENV brew bottle --merge --write ./*.bottle.json"
          # 5. push 双 remote（atomgit push 失败不阻断——主同步走 GitHub，atomgit 可后补）
          # 注意：brew --merge --write 在 fork 里已自动 commit，worktree 干净时跳过自己的 commit
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/
          git diff --cached --quiet || git commit -m "bottle(${{ inputs.formula }}): rebuild bottle $TAG"
          git push origin HEAD:main
          git push "https://social4hyq:${ATOMGIT_TOKEN}@atomgit.com/social4hyq/homebrew-core.git" HEAD:main \
            || echo "::warning::atomgit push 失败，GitHub 已更新，atomgit 侧需手动同步"

      - name: poured + test 验证（upload=true）
        if: inputs.upload
        run: |
          docker exec "$CONTAINER" bash -lc \
            "$BREW_ENV brew uninstall --ignore-dependencies ${{ inputs.formula }} || true"
          docker exec "$CONTAINER" bash -lc \
            "$BREW_ENV brew install --verbose social4hyq/core/${{ inputs.formula }}"
          POURED=$(docker exec "$CONTAINER" bash -lc \
            "$BREW_ENV brew info --json=v2 social4hyq/core/${{ inputs.formula }}" \
            | jq -r '.formulae[0].installed[0].poured_from_bottle')
          echo "poured_from_bottle=$POURED"
          [ "$POURED" = "true" ]
          # brew test 只告警不阻断：formula 的 test 块现状在服务器上同样失败
          # （如 icu4c@78 的 gendict），属 formula 质量问题而非 CI 管线问题
          docker exec "$CONTAINER" bash -lc "$BREW_ENV brew test ${{ inputs.formula }}" \
            || echo "::warning::brew test ${{ inputs.formula }} 未通过（服务器上同样失败的既有问题，不阻断）"
