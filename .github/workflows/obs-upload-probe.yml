name: obs-upload-probe

# THROWAWAY experiment — delete this file once the data is collected.
#
# bottle-build's "Publish to atomgit and push" step measured ~35min for a
# 31MB bottle (~15KB/s) on ubuntu-24.04-arm, while the same bottle mirrors to
# GitHub Releases in ~2s. This probe isolates just the atomgit OBS PUT (the
# same presigned-URL flow as publish.sh) to answer, with real data instead of
# guessing:
#   1. baseline-arm   — reproduce the ~15KB/s single-connection PUT on the
#                        same runner type bottle-build uses
#   2. baseline-x86   — same PUT on ubuntu-latest (x86) — is the throttle tied
#                        to the ARM runner pool's egress route?
#   3. parallel-arm   — 4 concurrent PUTs of independent 8MB objects on the
#                        ARM runner — per-connection throttle (aggregate ~4x)
#                        vs. total-pipe cap (aggregate stays ~15KB/s)?
#   4. multipart-probe (best-effort, non-blocking) — does the presigned
#                        upload_url endpoint expose anything multipart-shaped?
#                        Failure here just means "no", not a bug.
#
# Cleanup deletes the uploaded test assets. The (now-empty) atomgit release
# object itself has no documented delete-by-tag endpoint in our notes, so it
# is left behind for manual removal via the atomgit web UI — harmless
# clutter, not a real release.

on:
  workflow_dispatch: {}

concurrency:
  group: obs-upload-probe
  cancel-in-progress: false

permissions:
  contents: read

env:
  API: https://atomgit.com/api/v5/repos/social4hyq/homebrew-core
  TAG: obs-upload-probe-${{ github.run_id }}

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Create throwaway atomgit release
        env:
          ATOMGIT_TOKEN: ${{ secrets.ATOMGIT_TOKEN }}
        run: |
          curl -sf -X POST -H "Authorization: Bearer $ATOMGIT_TOKEN" -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"target_commitish\":\"main\",\"body\":\"throwaway obs-upload-probe run ${{ github.run_id }}, safe to delete\"}" \
            "$API/releases"

  baseline-arm:
    needs: setup
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    outputs:
      speed_kbs: ${{ steps.put.outputs.speed_kbs }}
    steps:
      - name: Generate 30MB blob
        run: dd if=/dev/urandom of=blob.bin bs=1M count=30 status=none

      - name: PUT via presigned URL, single connection
        id: put
        env:
          ATOMGIT_TOKEN: ${{ secrets.ATOMGIT_TOKEN }}
        run: |
          FILENAME=baseline-arm-${{ github.run_id }}.bin
          RESP=$(curl -sf -m 30 -H "Authorization: Bearer $ATOMGIT_TOKEN" \
            "$API/releases/$TAG/upload_url?file_name=$FILENAME")
          STATS=$(curl -sf --speed-limit 1024 --speed-time 120 -m 3600 -X PUT "$(echo "$RESP" | jq -r .url)" \
            -H "x-obs-meta-project-id: $(echo "$RESP" | jq -r '.headers["x-obs-meta-project-id"]')" \
            -H "x-obs-acl: $(echo "$RESP" | jq -r '.headers["x-obs-acl"]')" \
            -H "x-obs-callback: $(echo "$RESP" | jq -r '.headers["x-obs-callback"]')" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@blob.bin" -w "\n%{http_code} %{time_total} %{size_upload}")
          echo "$STATS"
          read -r CODE TIME SIZE <<< "$(echo "$STATS" | tail -1)"
          KBS=$(awk -v s="$SIZE" -v t="$TIME" 'BEGIN { printf "%.2f", (s/1024)/t }')
          echo "arm single-connection: ${KBS} KB/s (http=$CODE time=${TIME}s size=${SIZE}B)"
          echo "speed_kbs=$KBS" >> "$GITHUB_OUTPUT"

  baseline-x86:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      speed_kbs: ${{ steps.put.outputs.speed_kbs }}
    steps:
      - name: Generate 30MB blob
        run: dd if=/dev/urandom of=blob.bin bs=1M count=30 status=none

      - name: PUT via presigned URL, single connection
        id: put
        env:
          ATOMGIT_TOKEN: ${{ secrets.ATOMGIT_TOKEN }}
        run: |
          FILENAME=baseline-x86-${{ github.run_id }}.bin
          RESP=$(curl -sf -m 30 -H "Authorization: Bearer $ATOMGIT_TOKEN" \
            "$API/releases/$TAG/upload_url?file_name=$FILENAME")
          STATS=$(curl -sf --speed-limit 1024 --speed-time 120 -m 3600 -X PUT "$(echo "$RESP" | jq -r .url)" \
            -H "x-obs-meta-project-id: $(echo "$RESP" | jq -r '.headers["x-obs-meta-project-id"]')" \
            -H "x-obs-acl: $(echo "$RESP" | jq -r '.headers["x-obs-acl"]')" \
            -H "x-obs-callback: $(echo "$RESP" | jq -r '.headers["x-obs-callback"]')" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@blob.bin" -w "\n%{http_code} %{time_total} %{size_upload}")
          echo "$STATS"
          read -r CODE TIME SIZE <<< "$(echo "$STATS" | tail -1)"
          KBS=$(awk -v s="$SIZE" -v t="$TIME" 'BEGIN { printf "%.2f", (s/1024)/t }')
          echo "x86 single-connection: ${KBS} KB/s (http=$CODE time=${TIME}s size=${SIZE}B)"
          echo "speed_kbs=$KBS" >> "$GITHUB_OUTPUT"

  parallel-arm:
    needs: setup
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    outputs:
      aggregate_kbs: ${{ steps.put.outputs.aggregate_kbs }}
      per_conn_kbs: ${{ steps.put.outputs.per_conn_kbs }}
    steps:
      - name: Generate 4x 8MB blobs
        run: |
          for i in 1 2 3 4; do dd if=/dev/urandom of="blob$i.bin" bs=1M count=8 status=none; done

      - name: 4 concurrent PUTs via presigned URLs
        id: put
        env:
          ATOMGIT_TOKEN: ${{ secrets.ATOMGIT_TOKEN }}
        run: |
          upload_one() {
            i=$1
            FILENAME="parallel-arm-${i}-${{ github.run_id }}.bin"
            RESP=$(curl -sf -m 30 -H "Authorization: Bearer $ATOMGIT_TOKEN" \
              "$API/releases/$TAG/upload_url?file_name=$FILENAME")
            curl -sf --speed-limit 1024 --speed-time 120 -m 3600 -X PUT "$(echo "$RESP" | jq -r .url)" \
              -H "x-obs-meta-project-id: $(echo "$RESP" | jq -r '.headers["x-obs-meta-project-id"]')" \
              -H "x-obs-acl: $(echo "$RESP" | jq -r '.headers["x-obs-acl"]')" \
              -H "x-obs-callback: $(echo "$RESP" | jq -r '.headers["x-obs-callback"]')" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@blob$i.bin" -w "%{http_code} %{time_total} %{size_upload}\n" \
              > "result$i.txt"
          }
          START=$(date +%s.%N)
          for i in 1 2 3 4; do upload_one "$i" & done
          wait
          END=$(date +%s.%N)
          WALL=$(awk -v a="$START" -v b="$END" 'BEGIN { printf "%.2f", b - a }')
          TOTAL_BYTES=0
          for i in 1 2 3 4; do
            echo "-- result$i: $(cat "result$i.txt")"
            SZ=$(awk '{print $3}' "result$i.txt")
            TOTAL_BYTES=$((TOTAL_BYTES + SZ))
          done
          AGG_KBS=$(awk -v b="$TOTAL_BYTES" -v t="$WALL" 'BEGIN { printf "%.2f", (b/1024)/t }')
          PER_CONN_KBS=$(awk -v k="$AGG_KBS" 'BEGIN { printf "%.2f", k/4 }')
          echo "4x parallel: wall=${WALL}s total=${TOTAL_BYTES}B aggregate=${AGG_KBS}KB/s (~${PER_CONN_KBS}KB/s per connection)"
          echo "aggregate_kbs=$AGG_KBS" >> "$GITHUB_OUTPUT"
          echo "per_conn_kbs=$PER_CONN_KBS" >> "$GITHUB_OUTPUT"

  multipart-probe:
    needs: setup
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Probe for multipart-shaped presigned URLs (informational only)
        env:
          ATOMGIT_TOKEN: ${{ secrets.ATOMGIT_TOKEN }}
        run: |
          # The documented /upload_url endpoint only ever returned a single
          # whole-object PUT URL + OBS callback headers in prior use (see
          # publish.sh) — there's no known uploadId/partNumber parameter.
          # This just asks the same endpoint with speculative multipart
          # query params and records the raw response; a plain single-PUT
          # response or a 4xx both just mean "no multipart here" and are not
          # failures of this probe.
          echo "== plain call (control) =="
          curl -s -m 30 -H "Authorization: Bearer $ATOMGIT_TOKEN" \
            "$API/releases/$TAG/upload_url?file_name=multipart-probe-${{ github.run_id }}.bin" | jq .

          echo "== with partNumber/uploadId hint =="
          curl -s -m 30 -H "Authorization: Bearer $ATOMGIT_TOKEN" \
            "$API/releases/$TAG/upload_url?file_name=multipart-probe-${{ github.run_id }}.bin&partNumber=1&uploadId=probe" | jq . || true

  report-and-cleanup:
    needs: [setup, baseline-arm, baseline-x86, parallel-arm, multipart-probe]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Summary
        run: |
          {
            echo "## obs-upload-probe results (run ${{ github.run_id }})"
            echo
            echo "| test | result |"
            echo "|---|---|"
            echo "| baseline-arm (single conn, ubuntu-24.04-arm) | ${{ needs.baseline-arm.outputs.speed_kbs }} KB/s |"
            echo "| baseline-x86 (single conn, ubuntu-latest) | ${{ needs.baseline-x86.outputs.speed_kbs }} KB/s |"
            echo "| parallel-arm aggregate (4 conns) | ${{ needs.parallel-arm.outputs.aggregate_kbs }} KB/s |"
            echo "| parallel-arm per-connection | ${{ needs.parallel-arm.outputs.per_conn_kbs }} KB/s |"
            echo
            echo "Interpretation:"
            echo "- x86 much faster than arm → route/runner-pool issue, switch publish job's runner."
            echo "- per-connection ≈ baseline-arm AND aggregate ≈ 4x baseline-arm → per-connection throttle, parallelize the real upload."
            echo "- aggregate ≈ baseline-arm (no gain from parallelism) → total-pipe cap, need the GitHub-primary or async-decouple path instead."
            echo
            echo "See the multipart-probe job log for the speculative multipart query — expected to just say no."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Delete uploaded test assets (best-effort)
        env:
          ATOMGIT_TOKEN: ${{ secrets.ATOMGIT_TOKEN }}
        run: |
          ASSETS=$(curl -sf -H "Authorization: Bearer $ATOMGIT_TOKEN" "$API/releases/tags/$TAG" \
            | jq -r '.assets[] | select(.type=="attach") | .id')
          for id in $ASSETS; do
            echo "deleting asset $id"
            curl -s -X DELETE -H "Authorization: Bearer $ATOMGIT_TOKEN" \
              "$API/releases/$TAG/attach_files/$id" || true
          done
          echo "::notice::release object $TAG has no documented delete-by-tag endpoint; the now-empty test release must be removed manually via the atomgit web UI (https://atomgit.com/social4hyq/homebrew-core/releases)"
