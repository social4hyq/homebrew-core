name: test-pat-push

# Throwaway workflow: isolates the PAT-push mechanism from publish.sh
# (unset checkout's extraheader, push main with BOT_PUSH_TOKEN) so it can be
# verified against the protect-main ruleset without a full brew build +
# atomgit upload. Delete this file once verified.

on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Empty commit + PAT push to main
        env:
          BOT_PUSH_TOKEN: ${{ secrets.BOT_PUSH_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "test: verify BOT_PUSH_TOKEN bypasses protect-main ruleset (temporary)"
          git config --unset-all http.https://github.com/.extraheader || true
          git push "https://social4hyq:${BOT_PUSH_TOKEN}@github.com/social4hyq/homebrew-core.git" HEAD:main
