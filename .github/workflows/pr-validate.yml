name: pr-validate

# PR-driven CI: audit + source build + brew test for any formula added or
# changed in a pull request (new formula and version bumps both land here).
#
# 2026-07-20: build now really publishes (upload=true) with the bottle
# commit pushed back onto the PR's OWN branch (push_ref = head.ref), not
# just a build+test dry run — so by the time a human merges the PR, main
# already receives a formula that has its bottle. That push retriggers this
# workflow (a new commit landed on the PR branch); detect-changes.sh
# recognizes its own bottle write-back commit and short-circuits to an empty
# build/changed/heavy set, so the second run is fast and does nothing.
# Labels the PR ci-passed once light-check + build both pass (or are
# skipped, e.g. self-triggered runs or heavy-formula-only PRs).

on:
  pull_request:
    branches: [main]
    paths: ['Formula/**']

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-validate-${{ github.event.pull_request.number }}
  # false, not true: a multi-formula PR's build job pushes one bottle commit
  # per formula, each retriggering this workflow (synchronize). With
  # cancel-in-progress true, formula B's self-triggered run would cancel the
  # still-running matrix job mid-flight while formula A's push landed and
  # formula B's build was still going — corrupting the in-progress publish.
  # Queuing instead of canceling costs a little CI time on rapid pushes but
  # never kills a real build.
  cancel-in-progress: false

env:
  # Space-separated; heavy formulae are light-checked in PRs but never
  # auto-built here (even post-merge) — publishing them stays a manual
  # dispatch of bottle-build.yml, a 6h build isn't for unattended CI.
  HEAVY_FORMULAS: "llvm@21 bun-webkit"
  IMAGE: ghcr.io/social4hyq/ci-runner@sha256:38e740c8e355b2ccc9f34ba4bcab955a3fbc076278ae4bd3a07ea3707e90bb56 # :latest, 2026-07-19
  CONTAINER: ohos
  TAP_IN_CONTAINER: /storage/Users/currentUser/.harmonybrew/Homebrew/Library/Taps/social4hyq/homebrew-core

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      build: ${{ steps.diff.outputs.build }}
      changed: ${{ steps.diff.outputs.changed }}
      heavy: ${{ steps.diff.outputs.heavy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed formulae
        id: diff
        env:
          BEFORE: ${{ github.event.pull_request.base.sha }}
          AFTER: ${{ github.event.pull_request.head.sha }}
        run: .github/scripts/detect-changes.sh

  light-check:
    needs: detect
    if: needs.detect.outputs.changed != '[]'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    env:
      CHANGED_JSON: ${{ needs.detect.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - name: Start OHOS container
        run: .github/scripts/setup-container.sh
      - name: readall + audit
        run: .github/scripts/light-check.sh

  build:
    # bottle-build declares contents:write at its top level; a called
    # workflow may not exceed the caller's permissions, so this must grant
    # it (2026-07-20: an omitted grant here causes a parse-time
    # startup_failure with zero jobs created, not a runtime failure —
    # verified via a throwaway debug branch). Needed for real now too:
    # upload=true pushes the bottle commit back to the PR branch.
    permissions:
      contents: write
    needs: detect
    if: needs.detect.outputs.build != '[]'
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        formula: ${{ fromJSON(needs.detect.outputs.build) }}
    uses: ./.github/workflows/bottle-build.yml
    with:
      formula: ${{ matrix.formula }}
      upload: true
      push_ref: ${{ github.event.pull_request.head.ref }}
    secrets: inherit

  label:
    needs: [detect, light-check, build]
    # both needed jobs are conditionally skipped when their input list is
    # empty; treat skipped as pass so a PR that only touches one category
    # (e.g. light-check-only heavy formula) still gets labeled
    if: |
      always() &&
      (needs.light-check.result == 'success' || needs.light-check.result == 'skipped') &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Label ci-passed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: gh pr edit "$PR" --add-label ci-passed --repo "${{ github.repository }}"
